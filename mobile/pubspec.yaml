name: haryana_roadways
description: Haryana Roadways Passenger App — Digital ticketing, live tracking & bus pass management
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  go_router: ^14.2.7

  dio: ^5.7.0

  flutter_secure_storage: ^9.2.2

  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  google_fonts: ^6.2.1

  pin_code_fields: ^8.0.1
  intl: ^0.19.0
  image_picker: ^1.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
